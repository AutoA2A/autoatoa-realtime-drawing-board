<h1>历史记录</h1>
<div id="info" style="margin-bottom:16px;color:#555;"></div>

<div>
  <strong>已保存的回放：</strong>
  <div id="thumbList" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;"></div>
</div>

<div id="compareArea" style="margin-bottom:16px;display:none;">
  <div>对比视图：</div>
  <div id="compareImages" style="display:flex;gap:8px;"></div>
</div>

<div id="controls" style="margin-bottom:16px;">
  <button id="btnPlay" style="background-color:#3498db;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;">播放回放</button>
  <button id="btnCompare" style="background-color:#3498db;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;margin-left:8px;">对比选中</button>
  <button id="btnRestore" style="background-color:#3498db;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;margin-left:8px;">恢复选中版本</button>
  <button id="btnDelete" style="background-color:#3498db;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;margin-left:8px;">删除选中版本</button>
  <button id="btnClear" style="background-color:#3498db;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;margin-left:8px;">清空历史</button>
</div>

<canvas id="replayCanvas" style="display:none;border:1px solid #ccc;background:#fff;margin-top:8px;"></canvas>

<script>
(function(){
  const params = new URLSearchParams(location.search);
  const boardId = params.get('board') || 'default';
  const storageKey = 'board_' + boardId + '_history';
  const infoEl = document.getElementById('info');
  const thumbList = document.getElementById('thumbList');
  const compareArea = document.getElementById('compareArea');
  const compareImages = document.getElementById('compareImages');
  const replayCanvas = document.getElementById('replayCanvas');
  const ctx = replayCanvas.getContext('2d');
  const btnPlay = document.getElementById('btnPlay');
  const btnCompare = document.getElementById('btnCompare');
  const btnRestore = document.getElementById('btnRestore');
  const btnDelete = document.getElementById('btnDelete');
  const btnClear = document.getElementById('btnClear');

  let history = JSON.parse(localStorage.getItem(storageKey)) || [];
  let selected = []; // stores indices

  function renderThumbnails(){
    thumbList.innerHTML = '';
    history.forEach((item, idx)=>{
      const img = document.createElement('img');
      img.src = item.dataURL;
      img.title = new Date(item.time).toLocaleString();
      img.style.width = '100px';
      img.style.height = '75px';
      img.style.objectFit = 'contain';
      img.style.border = '1px solid #ddd';
      img.style.borderRadius = '4px';
      img.style.cursor = 'pointer';
      img.dataset.idx = idx;
      img.onclick = ()=> toggleSelect(idx);
      thumbList.appendChild(img);
    });
    updateInfo();
  }

  function toggleSelect = function(idx){
    const pos = selected.indexOf(idx);
    if(pos>-1){
      selected.splice(pos,1);
    }else if(selected.length<2){
      selected.push(idx);
    }
    // update UI
    const imgs = thumbList.querySelectorAll('img');
    imgs.forEach((i,ix)=>{
      i.style.border = selected.includes(ix)?'2px solid #3498db':'1px solid #ddd';
    });
    compareArea.style.display = selected.length===2?'block':'none';
    if(selected.length===2){
      showCompare();
    }
  };

  function showCompare(){
    compareImages.innerHTML = '';
    selected.forEach(idx=>{
      const img = document.createElement('img');
      img.src = history[idx].dataURL;
      img.title = new Date(history[idx].time).toLocaleString();
      img.style.width = '200px';
      img.style.height = '150px';
      img.style.objectFit = 'contain';
      img.style.border = '1px solid #3498db';
      img.style.borderRadius = '4px';
      compareImages.appendChild(img);
    });
  }

  function updateInfo(){
    if(history.length===0){
      infoEl.textContent = '暂无历史记录。请在协作板上绘画后自动保存。';
    }else{
      infoEl.textContent = `共 ${history.length} 条记录（点击缩略图选择）`;
    }
  }

  function playFrom(startIdx=0){
    if(playTimer) clearInterval(playTimer);
    replayCanvas.style.display = 'block';
    let idx = startIdx;
    const first = new Image();
    first.onload = ()=>{
      replayCanvas.width = first.width;
      replayCanvas.height = first.height;
    };
    first.src = history[0].dataURL;
    function draw(){
      const rec = history[idx];
      const img = new Image();
      img.onload = ()=>{
        ctx.clearRect(0,0,replayCanvas.width,replayCanvas.height);
        ctx.drawImage(img,0,0);
      };
      img.src = rec.dataURL;
      idx = (idx+1)%history.length;
    }
    draw();
    playTimer = setInterval(draw, 1000);
  }
  let playTimer = null;

  btnPlay.onclick = ()=> playFrom(0);
  btnCompare.onclick = ()=>{ if(selected.length===2) showCompare(); };
  btnRestore.onclick = ()=>{
    if(selected.length===0){ alert('请先选择一个版本'); return; }
    const data = history[selected[0]].dataURL;
    // redirect to board with restore param
    location.href = `board.html?board=${boardId}&restore=${encodeURIComponent(data)}`;
  };
  btnDelete.onclick = ()=>{
    if(selected.length===0){ alert('请先选择要删除的版本'); return; }
    if(!confirm('确定删除选中的历史记录吗？')) return;
    // remove selected indices (higher first)
    const toRemove = [...selected].sort((a,b)=>b-a);
    toRemove.forEach(idx=>{ history.splice(idx,1); });
    selected = [];
    localStorage.setItem(storageKey, JSON.stringify(history));
    renderThumbnails();
  };
  btnClear.onclick = ()=>{
    if(!confirm('确定清空所有历史记录吗？')) return;
    localStorage.removeItem(storageKey);
    history = [];
    selected = [];
    renderThumbnails();
  };

  // init
  renderThumbnails();
})();
</script>
