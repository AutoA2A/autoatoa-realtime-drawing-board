<h2>协作模板</h2>
<p>选择一个模板，将其应用到协作板中开始创作：</p>
<div id="template-grid" style="display:flex;flex-wrap:wrap;gap:16px;"></div>

<script>
(function(){
    var templates = [
        {id:"flowchart", name:"流程图", svg:'<svg width="120" height="120" xmlns="http://www.w3.org/2000/svg"><rect x="10" y="10" width="100" height="40" fill="none" stroke="#3498db" stroke-width="2"/><text x="60" y="35" font-size="12" text-anchor="middle" fill="#3498db">开始</text><line x1="60" y1="50" x2="60" y2="80" stroke="#3498db" stroke-width="2"/><polygon points="55,80 60,90 65,80" fill="#3498db"/><text x="60" y="100" font-size="12" text-anchor="middle" fill="#3498db">结束</text></svg>'},
        {id:"mindmap", name:"思维导图", svg:'<svg width="120" height="120" xmlns="http://www.w3.org/2000/svg"><circle cx="60" cy="30" r="20" fill="none" stroke="#3498db" stroke-width="2"/><text x="60" y="35" font-size="12" text-anchor="middle" fill="#3498db">中心</text><line x1="60" y1="50" x2="30" y2="80" stroke="#3498db" stroke-width="2"/><circle cx="30" cy="80" r="15" fill="none" stroke="#3498db" stroke-width="2"/><text x="30" y="85" font-size="10" text-anchor="middle" fill="#3498db">分支1</text><line x1="60" y1="50" x2="90" y2="80" stroke="#3498db" stroke-width="2"/><circle cx="90" cy="80" r="15" fill="none" stroke="#3498db" stroke-width="2"/><text x="90" y="85" font-size="10" text-anchor="middle" fill="#3498db">分支2</text></svg>'},
        {id:"webframe", name:"网页框架", svg:'<svg width="120" height="120" xmlns="http://www.w3.org/2000/svg"><rect x="10" y="10" width="100" height="100" fill="none" stroke="#3498db" stroke-width="2"/><line x1="10" y1="40" x2="110" y2="40" stroke="#3498db" stroke-width="2"/><line x1="10" y1="70" x2="110" y2="70" stroke="#3498db" stroke-width="2"/><rect x="20" y="20" width="80" height="15" fill="#3498db"/><rect x="20" y="50" width="60" height="15" fill="#3498db"/><rect x="20" y="80" width="70" height="15" fill="#3498db"/></svg>'}
    ];

    var container = document.getElementById('template-grid');

    templates.forEach(function(t){
        var card = document.createElement('div');
        card.style.cssText = 'border:1px solid #ddd;border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;background:#fff;width:160px;';
        
        card.innerHTML = '<div style="margin-bottom:8px;">' + t.svg + '</div><div style="font-weight:bold;color:#333;">' + t.name + '</div><div style="font-size:12px;color:#777;margin-top:4px;">点击应用此模板</div>';
        
        card.addEventListener('mouseover', function(){
            this.style.transform = 'translateY(-4px)';
            this.style.boxShadow = '0 4px 12px rgba(0,0,0,0.1)';
        });
        
        card.addEventListener('mouseout', function(){
            this.style.transform = 'translateY(0)';
            this.style.boxShadow = 'none';
        });

        // 模板点击事件处理和跳转逻辑
        card.addEventListener('click', function(){
            // 将选中的模板ID通过URL参数传递给board.html
            window.location.href = 'board.html?template=' + encodeURIComponent(t.id);
        });

        container.appendChild(card);
    });
})();
</script>
