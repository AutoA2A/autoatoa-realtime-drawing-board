<section style="margin-bottom: 16px;">
    <h2 style="margin-top: 0;">实时涂鸦协作</h2>
    <article class="card" style="background-color: #fff; padding: 16px; border-radius: 8px; box-shadow: 0 0 8px rgba(0,0,0,0.1);">
        <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px;">
            <button data-tool="brush" class="tool-btn active" style="background-color: #3498db; color: #fff; border: none; padding: 8px 16px; font-size: 16px; border-radius: 8px; cursor: pointer;">画笔</button>
            <button data-tool="eraser" class="tool-btn" style="background-color: #3498db; color: #fff; border: none; padding: 8px 16px; font-size: 16px; border-radius: 8px; cursor: pointer;">橡皮</button>
            <input type="color" id="colorPicker" value="#000000" title="选择颜色" style="border: none; width: 36px; height: 36px; cursor: pointer; padding: 0; background: none;">
            <input type="range" id="sizePicker" min="1" max="30" value="4" title="画笔粗细" style="cursor: pointer;">
            <button id="clearBtn" style="background-color: #e74c3c; color: #fff; border: none; padding: 8px 16px; font-size: 16px; border-radius: 8px; cursor: pointer;">清空画布</button>
        </div>
        <div style="position: relative; width: 100%; overflow: hidden; border-radius: 8px; border: 1px solid #ddd;">
            <canvas id="drawingCanvas" style="width: 100%; height: 500px; display: block; touch-action: none; background-color: #fff; cursor: crosshair;"></canvas>
        </div>
        <p style="font-size: 14px; color: #777; margin-top: 12px; text-align: center;">在画布上按住鼠标或触摸拖动即可进行涂鸦创作</p>
    </article>
</section>

<style>
    .tool-btn { opacity: 0.6; transition: opacity 0.2s; }
    .tool-btn.active { opacity: 1; font-weight: bold; }
</style>

<script>
(function() {
    const canvas = document.getElementById('drawingCanvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    const sizePicker = document.getElementById('sizePicker');
    const clearBtn = document.getElementById('clearBtn');
    const toolBtns = document.querySelectorAll('.tool-btn');

    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let currentTool = 'brush';
    let currentColor = '#000000';
    let currentSize = 4;

    function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    function startDraw(e) {
        e.preventDefault();
        isDrawing = true;
        const pos = getPos(e);
        lastX = pos.x;
        lastY = pos.y;
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getPos(e);

        ctx.strokeStyle = currentTool === 'eraser' ? '#FFFFFF' : currentColor;
        ctx.lineWidth = currentTool === 'eraser' ? currentSize * 3 : currentSize;
        
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);

        lastX = pos.x;
        lastY = pos.y;
    }

    function endDraw() {
        if (isDrawing) {
            ctx.stroke();
            isDrawing = false;
        }
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);

    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);

    toolBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            toolBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentTool = this.getAttribute('data-tool');
            canvas.style.cursor = currentTool === 'eraser' ? 'cell' : 'crosshair';
        });
    });

    colorPicker.addEventListener('input', function() {
        currentColor = this.value;
        if (currentTool === 'eraser') {
            currentTool = 'brush';
            toolBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tool="brush"]').classList.add('active');
            canvas.style.cursor = 'crosshair';
        }
    });

    sizePicker.addEventListener('input', function() {
        currentSize = parseInt(this.value, 10);
    });

    clearBtn.addEventListener('click', function() {
        const rect = canvas.getBoundingClientRect();
        ctx.clearRect(0, 0, rect.width, rect.height);
    });
})();
</script>
