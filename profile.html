<sectionstyle="margin-bottom:16px;">
  <h2 style="margin-top:0;">个人信息</h2>
  <div id="avatarPreview" style="width:80px;height:80px;border-radius:50%;background:#3498db;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:8px;"></div>
  <input type="file" id="avatarInput" accept="image/png,image/jpeg" style="display:block;margin-bottom:8px;">
  <label for="username" style="display:block;margin-bottom:4px;">用户名</label>
  <input type="text" id="username" placeholder="请输入用户名" style="width:100%;padding:8px;border:1px solid #3498db;border-radius:4px;margin-bottom:8px;">
  <label for="password" style="display:block;margin-bottom:4px;">新密码（留空表示不修改）</label>
  <input type="password" id="password" placeholder="请输入新密码" style="width:100%;padding:8px;border:1px solid #3498db;border-radius:4px;margin-bottom:8px;">
  <div style="margin-bottom:8px;">
    <button id="saveBtn" style="background-color:#3498db;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;">保存修改</button>
    <button id="logoutBtn" style="background:transparent;color:#3498db;border:2px solid #3498db;border-radius:4px;padding:6px 14px;cursor:pointer;margin-left:8px;">退出登录</button>
  </div>
  <div id="msg" style="font-size:14px;color:#333;margin-top:8px;"></div>
</section>
<a href="dashboard.html" style="display:inline-block;padding:4px 8px;background-color:#3498db;color:#fff;border-radius:4px;text-decoration:none;font-size:13px;">返回仪表盘</a>
<script>
  const STORAGE_KEY = 'user';
  function loadUser(){ const d=localStorage.getItem(STORAGE_KEY); return d?JSON.parse(d):null; }
  function saveUser(u){ localStorage.setItem(STORAGE_KEY,JSON.stringify(u)); }
  function init(){
    const user=loadUser();
    if(!user){ location.href='login.html'; return; }
    document.getElementById('username').value=user.username||'';
    const avatarPreview=document.getElementById('avatarPreview');
    if(user.avatar){
      avatarPreview.style.backgroundImage=`url(${user.avatar})`;
      avatarPreview.style.backgroundSize='cover';
      avatarPreview.style.backgroundPosition='center';
      avatarPreview.innerHTML='';
    }else{
      const initials=(user.username?user.username[0]:'U').toUpperCase();
      avatarPreview.style.backgroundImage='';
      avatarPreview.innerHTML=initials;
    }
  }
  document.getElementById('avatarInput').addEventListener('change',function(e){
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=function(){
      const url=reader.result;
      const preview=document.getElementById('avatarPreview');
      preview.style.backgroundImage=`url(${url})`;
      preview.style.backgroundSize='cover';
      preview.style.backgroundPosition='center';
      preview.innerHTML='';
      preview._newAvatar=url;
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('saveBtn').addEventListener('click',function(){
    const user=loadUser();
    if(!user) return;
    const username=document.getElementById('username').value.trim();
    if(!username){ alert('用户名不能为空'); return; }
    user.username=username;
    const password=document.getElementById('password').value;
    if(password) user.password=password;
    const avatarInput=document.getElementById('avatarInput');
    if(avatarInput.files[0]){
      const reader=new FileReader();
      reader.onload=function(){
        user.avatar=reader.result;
        saveUser(user);
        document.getElementById('msg').textContent='保存成功';
      };
      reader.readAsDataURL(avatarInput.files[0]);
    }else if(document.getElementById('avatarPreview')._newAvatar){
      user.avatar=document.getElementById('avatarPreview')._newAvatar;
      saveUser(user);
      document.getElementById('msg').textContent='保存成功';
    }else{
      saveUser(user);
      document.getElementById('msg').textContent='保存成功';
    }
  });
  document.getElementById('logoutBtn').addEventListener('click',function(){
    localStorage.removeItem(STORAGE_KEY);
    location.href='login.html';
  });
  init();
</script>
