<h2>登录</h2>
<form id="loginForm">
  <label for="loginUsername">用户名或邮箱</label><br>
  <input type="text" id="loginUsername" placeholder="输入用户名或邮箱" autocomplete="username"><br><br>
  <label for="loginPassword">密码</label><br>
  <input type="password" id="loginPassword" placeholder="输入密码" autocomplete="current-password"><br><br>
  <button type="submit">登录</button>
</form>
<div id="loginMessage"></div>
<p>还没有账号？<a href="register.html?id=signup">去注册</a></p>

<script>
(() => {
  const form = document.getElementById('loginForm');
  const message = document.getElementById('loginMessage');

  function getUsers() {
    const data = localStorage.getItem('users');
    return data ? JSON.parse(data) : [];
  }

  form.addEventListener('submit', e => {
    e.preventDefault();
    const username = form.loginUsername.value.trim();
    const password = form.loginPassword.value;
    if (!username || !password) {
      message.textContent = '请填写完整信息';
      message.style.color = '#d93025';
      return;
    }
    const users = getUsers();
    const user = users.find(u =>
      (u.username === username || u.email === username) && u.password === password
    );
    if (user) {
      message.textContent = '登录成功，正在跳转...';
      message.style.color = '#1e8e3e';
      localStorage.setItem('currentUser', JSON.stringify(user));
      // 跳转到首页（实际使用中可改为 board.html 或 dashboard.html）
      setTimeout(() => { location.href = 'index.html'; }, 800);
    } else {
      message.textContent = '用户名或密码错误';
      message.style.color = '#d93025';
    }
  });
})();
</script>
